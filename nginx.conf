events {}
http {
    server {
        listen 3000;
        location /api/ {
            proxy_pass http://192.168.117.64:8080/api/;  # Backend port
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location / {
            # Serve frontend static files
            root /path/to/frontend/dist;
            try_files $uri $uri/ /index.html;
        }
    }
}
