version: '3.8'

services:
  nginx_frontend:
    image: nginx:alpine
    container_name: openclaw-frontend-nginx
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount the frontend static build directory into nginx html root.
      # Replace with your real build output (e.g. ./workspace/dist or ./workspace/out)
      - ./workspace/public:/usr/share/nginx/html:ro


